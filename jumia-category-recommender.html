<script type="text/babel">
const{useState,useEffect}=React;
const CL={"Fashion":"bg-pink-100 text-pink-700","Electronics":"bg-blue-100 text-blue-700","Home & Office":"bg-amber-100 text-amber-700","Health & Beauty":"bg-emerald-100 text-emerald-700","Phones & Tablets":"bg-purple-100 text-purple-700","Computing":"bg-indigo-100 text-indigo-700","Sporting Goods":"bg-orange-100 text-orange-700","Grocery":"bg-lime-100 text-lime-700","Automobile":"bg-slate-100 text-slate-700","Baby Products":"bg-rose-100 text-rose-700","Gaming":"bg-fuchsia-100 text-fuchsia-700","Toys & Games":"bg-green-100 text-green-700","Garden & Outdoors":"bg-teal-100 text-teal-700","Books Movies and Music":"bg-sky-100 text-sky-700","Pet Supplies":"bg-yellow-100 text-yellow-700","Industrial & Scientific":"bg-cyan-100 text-cyan-700"};
function tok(t){return t.toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(x=>x.length>1);}
function sc(c,ts,q){let s=q&&c.s.includes(q)?30:0;for(const t of ts){if(!c.s.includes(t))continue;if(c.p.toLowerCase().includes(t))s+=12;if(c.l4.toLowerCase().includes(t))s+=8;if(c.l3.toLowerCase().includes(t))s+=6;if(c.l2.toLowerCase().includes(t))s+=4;if(c.l1.toLowerCase().includes(t))s+=2;if(c.v.toLowerCase().includes(t))s+=5;s+=1;}return s;}
function App(){
const[cats,set]=useState([]);
const[q,setQ]=useState("");
const[res,setR]=useState([]);
const[done,setD]=useState(false);
useEffect(()=>{
const r=Papa.parse(document.getElementById("d").textContent,{header:true,skipEmptyLines:true}).data;
set(r.filter(x=>x.path&&x.l_1).map(x=>({p:x.path,l1:x.l_1,l2:x.l_2||"",l3:x.l_3||"",l4:x.l_4||"",v:x.vc||"",s:((x.l_1||"")+" "+(x.l_2||"")+" "+(x.l_3||"")+" "+(x.l_4||"")+" "+x.path+" "+(x.vc||"")).toLowerCase()})));
},[]);
const go=(v)=>{const ts=tok(v),fq=v.toLowerCase().replace(/[^a-z0-9\s]/g," ").trim();setR(cats.map(c=>({c,s:sc(c,ts,fq)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,8).map(x=>x.c));setD(true);};
return(<div className="max-w-2xl mx-auto px-4 py-8">
<div className="text-center mb-6">
<div className="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center text-white font-bold text-xl mx-auto mb-3">J</div>
<h1 className="text-2xl font-bold text-gray-900">Category Recommender</h1>
<p className="text-gray-500 text-sm mt-1">Type a product name to get the right Jumia category</p>
<p className="text-xs text-gray-400 mt-0.5">{cats.length} categories loaded</p>
</div>
<div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 mb-4">
<div className="flex gap-2">
<input type="text" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go(q)} placeholder="e.g. wireless earbuds, summer dress, motor oil..." className="flex-1 px-3 py-2.5 text-sm rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50"/>
<button onClick={()=>go(q)} disabled={!q.trim()} className="px-5 py-2.5 bg-orange-500 hover:bg-orange-600 disabled:opacity-40 text-white text-sm font-medium rounded-lg transition-colors">Search</button>
</div>
<div className="flex flex-wrap gap-1.5 mt-3 items-center">
<span className="text-xs text-gray-400">Try:</span>
{["iPhone","running shoes","face cream","air fryer","laptop","motor oil","yoga mat","summer dress"].map(e=><button key={e} onClick={()=>{setQ(e);go(e);}} className="text-xs px-2.5 py-1 rounded-full border border-gray-200 hover:bg-orange-50 hover:border-orange-200 hover:text-orange-700 transition-colors">{e}</button>)}
</div>
</div>
{done&&res.length===0&&<p className="text-center text-gray-400 py-8 text-sm">No results found. Try different keywords.</p>}
{res.length>0&&<div className="space-y-2">
<p className="text-xs text-gray-400 uppercase tracking-wide font-medium px-1 mb-3">Top {res.length} matches</p>
{res.map((c,i)=>{const cr=[c.l1,c.l2,c.l3,c.l4,c.p].filter(Boolean);return(<div key={i} className={`bg-white rounded-xl border p-4 hover:shadow-md transition-shadow ${i===0?"border-orange-300 shadow-sm":"border-gray-200"}`}><div className="flex items-start justify-between gap-3"><div className="flex-1 min-w-0"><div className="flex flex-wrap items-center gap-1 mb-2">{cr.map((x,j)=><React.Fragment key={j}><span className={`text-xs ${j===cr.length-1?"font-semibold text-gray-800":"text-gray-400"}`}>{x}</span>{j<cr.length-1&&<span className="text-gray-300 mx-0.5">›</span>}</React.Fragment>)}</div>{c.v&&<div className="flex items-center gap-1.5 mt-1"><span className="text-xs text-gray-400">Seller category:</span><span className="text-xs font-medium px-2 py-0.5 bg-gray-100 text-gray-600 rounded-full">{c.v}</span></div>}</div><div className="flex flex-col items-end gap-1.5">{i===0&&<span className="text-xs px-2 py-0.5 bg-orange-500 text-white rounded-full font-medium">Best Match</span>}<span className={`text-xs px-2 py-0.5 rounded-full font-medium ${CL[c.l1]||"bg-gray-100 text-gray-600"}`}>{c.l1}</span></div></div></div>);})}
<p className="text-xs text-center text-gray-300 pt-2">Ranked by keyword relevance</p>
</div>}
{!done&&cats.length>0&&<div className="text-center py-14"><p className="text-sm text-gray-400">Type a product name above to get category recommendations</p></div>}
</div>);
}
ReactDOM.createRoot(document.getElementById("r")).render(<App/>);
</script>
